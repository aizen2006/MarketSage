version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: marketsage-db
    environment:
      POSTGRES_DB: marketsage
      POSTGRES_USER: marketsage
      POSTGRES_PASSWORD: marketsage
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketsage -d marketsage || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: marketsage-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://marketsage:marketsage@db:5432/marketsage?schema=public}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-backend:
    build:
      context: .
      dockerfile: ./apps/api-backend/Dockerfile
    container_name: marketsage-api-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://marketsage:marketsage@db:5432/marketsage?schema=public}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FMP_API_KEY: ${FMP_API_KEY:-}
      API_PORT: ${API_PORT:-4001}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

